name: CI

on:
  push:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download modules
        run: go mod download

      # GUI (cmd/sshush-gui) needs Fyne/CGO and a display; skip it in CI.
      - name: Build CLI and daemon
        run: |
          go build -o /tmp/sshush ./cmd/sshush
          go build -o /tmp/sshushd ./cmd/sshushd

      - name: Test (excluding GUI)
        run: |
          go test ./... -v -race
