name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: extractions/setup-just@v3

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: test 
        run: just test

      - name: Get tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
          VERSION: ${{ steps.tag.outputs.version }}
        run: just version=${{ steps.tag.outputs.version }} package

      - name: Validate artifacts
        run: just check-artifacts ${{ steps.tag.outputs.version }}

      - name: Release
        if: ${{ !env.ACT }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/*.tar.gz
            build/*.deb
            build/*.rpm
            build/*.pkg.tar.zst
